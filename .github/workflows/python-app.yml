name: Python Application

on:
  push:
    branches: [ "main", "bolt-optimization-latest-assessments" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install mistralai==1.1.0  # Force version for modern Mistral class compatibility
    - name: Test with pytest
      run: |
        pytest
