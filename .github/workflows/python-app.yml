name: Python application

on:
  push:
    branches: [ "main", "palette-ssp-*" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio httpx sqlalchemy aiosqlite pydantic-settings fastapi uvicorn python-dotenv python-jose[cryptography] passlib[bcrypt] python-docx openpyxl reportlab jsonschema pyyaml pandas mistralai==1.1.0 fastapi-mcp mcp anthropic openai psycopg2-binary
    - name: Test with pytest
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        python -m pytest
